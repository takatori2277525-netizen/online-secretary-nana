<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>shacho-time-diagnosis</title>
  <style>
    :root{--n:#082653;--i:#263142;--m:#6f737a;--g:#b9aea0;--p:#f7f4ef;--l:#e6ded4}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top right,rgba(239,232,222,.42),transparent 32rem),linear-gradient(180deg,#fff,#fbfaf8);font-family:"Noto Sans JP",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--i)}
    .page{min-height:100vh;padding:24px 20px;display:flex;align-items:center;justify-content:center}.wrap{width:100%;max-width:500px}.card{background:rgba(255,255,255,.95);border:1px solid var(--l);border-radius:32px;box-shadow:0 18px 48px rgba(8,38,83,.08);padding:28px;margin-bottom:20px}.icon{width:48px;height:48px;border-radius:16px;background:var(--p);color:var(--n);display:flex;align-items:center;justify-content:center}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:38px}.ey{font-size:12px;letter-spacing:.22em;color:var(--g);font-weight:700}.sm{font-size:14px;line-height:1.9;color:var(--m)}h1{margin:0;color:var(--n);font-size:42px;line-height:1.15}h2{margin:0;color:var(--n);font-size:26px;line-height:1.45}.rule{width:112px;height:1px;background:var(--l);margin:28px 0}.body{font-size:16px;line-height:2.25}.btn{min-height:56px;width:100%;border:0;border-radius:16px;background:var(--n);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;cursor:pointer;box-shadow:0 14px 28px rgba(8,38,83,.18)}.btn:disabled{opacity:.42}.ghost{border:0;background:transparent;color:var(--m);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;margin:16px auto 0;cursor:pointer}.ghost.n{color:var(--n)}.meta{display:flex;justify-content:space-between;font-size:14px;margin-bottom:12px}.bar{height:8px;border-radius:99px;background:var(--p);overflow:hidden}.fill{height:100%;border-radius:99px;background:var(--n);transition:width .25s}.qt{min-height:88px;margin-top:34px}.opts{display:grid;gap:12px;margin-top:28px}.opt{border:1px solid var(--l);background:#fff;border-radius:18px;padding:16px;text-align:left;cursor:pointer;color:var(--i)}.opt.on{background:var(--n);color:#fff;border-color:var(--n);box-shadow:0 12px 28px rgba(8,38,83,.16)}.ot{display:flex;justify-content:space-between;align-items:center;font-weight:700}.od{display:block;margin-top:6px;font-size:14px;line-height:1.7;color:var(--m)}.opt.on .od{color:rgba(255,255,255,.78)}.dot{width:24px;height:24px;border-radius:50%;border:1px solid var(--l);display:flex;align-items:center;justify-content:center;color:transparent}.opt.on .dot{background:#fff;border-color:#fff;color:var(--n)}.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:32px}.back,.next{min-height:48px;border:0;border-radius:16px;font-weight:700;cursor:pointer}.back{background:transparent;color:var(--m);padding:0 16px}.next{min-width:128px;background:var(--n);color:#fff;padding:0 20px}.back:disabled,.next:disabled{opacity:.38}.soft{background:var(--p);border-radius:28px;padding:22px;margin-top:22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}.panel{border:1px solid var(--l);background:#fff;border-radius:24px;padding:20px}.pt{font-size:14px;font-weight:800;color:var(--n)}.hours{font-size:40px;color:var(--n);font-weight:800;margin-top:18px}.list{list-style:none;padding:0;margin:14px 0 0;display:grid;gap:10px;font-size:14px}.pills{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}.pill{background:var(--p);border-radius:16px;padding:14px 10px;text-align:center;color:var(--n);font-weight:700;font-size:14px}.toast{min-height:20px;text-align:center;color:var(--m);font-size:13px;margin-top:10px}@media(max-width:520px){.page{align-items:flex-start}.card{padding:24px;border-radius:28px}h1{font-size:38px}.grid,.pills{grid-template-columns:1fr}.hours{font-size:38px}}
  </style>
</head>
<body>
<main id="app"></main>
<script>
const J={
title:"\u793e\u9577\u306e\u6642\u9593\u8a3a\u65ad",sub:"3\u5206\u3067\u308f\u304b\u308b",you:"\u3042\u306a\u305f\u304c",start:"\u8a3a\u65ad\u3092\u59cb\u3081\u308b",
hand:"\u624b\u653e\u305b\u308b\u4ed5\u4e8b",hours:"\u6bce\u6708\u53d6\u308a\u623b\u305b\u308b\u6642\u9593",priority:"\u512a\u5148\u3057\u3066\u6539\u5584\u3059\u3079\u304d\u696d\u52d9",wakaru:"\u304c\u5206\u304b\u308a\u307e\u3059\u3002",
almost:"\u307b\u307c\u6bce\u56de",sometimes:"\u6642\u3005",rare:"\u307b\u3068\u3093\u3069\u3057\u306a\u3044",desc1:"\u81ea\u5206\u3067\u62b1\u3048\u3066\u3044\u308b\u3053\u3068\u304c\u591a\u3044",desc2:"\u4e00\u90e8\u3060\u3051\u4efb\u305b\u3089\u308c\u305d\u3046",desc3:"\u4eca\u306f\u5927\u304d\u306a\u8ca0\u62c5\u3067\u306f\u306a\u3044",
result:"RESULT",recovered:"\u53d6\u308a\u623b\u305b\u308b\u6642\u9593",first:"\u6700\u521d\u306b\u624b\u653e\u3059\u4ed5\u4e8b",point:"\u6539\u5584\u30dd\u30a4\u30f3\u30c8",ai:"AI\u6d3b\u7528",manualize:"\u30de\u30cb\u30e5\u30a2\u30eb\u5316",secretary:"\u30aa\u30f3\u30e9\u30a4\u30f3\u79d8\u66f8\u6d3b\u7528",
cta:"\u4e00\u4eba\u3067\u62b1\u3048\u8fbc\u307e\u306a\u304f\u3066\u3082\u5927\u4e08\u592b\u3067\u3059\u3002",exp:"20\u5e74\u4ee5\u4e0a",support1:"\u4eba\u3092\u652f\u3048\u308b\u4ed5\u4e8b\u3092\u7d9a\u3051\u3066\u304d\u305f\u7d4c\u9a13\u3092\u6d3b\u304b\u3057\u3001",support2:"\u3042\u306a\u305f\u304c\u672c\u696d\u306b\u96c6\u4e2d\u3067\u304d\u308b\u74b0\u5883\u3065\u304f\u308a\u3092",support3:"\u30b5\u30dd\u30fc\u30c8\u3057\u307e\u3059\u3002",consult:"LINE\u3067\u76f8\u8ac7\u3059\u308b",copy:"\u8a3a\u65ad\u7d50\u679c\u3092\u30b3\u30d4\u30fc",again:"\u3082\u3046\u4e00\u5ea6\u8a3a\u65ad\u3059\u308b",copied:"\u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f",score:"\u70b9\u6570"
};
const lineUrl="https://konx79gh.autosns.app/line";
const qs=[
["docs","\u8cc7\u6599\u4f5c\u6210\u3092\u81ea\u5206\u3067\u3057\u3066\u3044\u307e\u3059\u304b\uff1f","\u8cc7\u6599\u4f5c\u6210",4],["canva","Canva\u753b\u50cf\u3092\u81ea\u5206\u3067\u4f5c\u3063\u3066\u3044\u307e\u3059\u304b\uff1f","Canva",3],["line","LINE\u69cb\u7bc9\u30fb\u4fee\u6b63\u3092\u81ea\u5206\u3067\u3057\u3066\u3044\u307e\u3059\u304b\uff1f","LINE",5],["schedule","\u30b9\u30b1\u30b8\u30e5\u30fc\u30eb\u7ba1\u7406\u3092\u3057\u3066\u3044\u307e\u3059\u304b\uff1f","\u30b9\u30b1\u30b8\u30e5\u30fc\u30eb\u7ba1\u7406",3],["zoom","Zoom\u6e96\u5099\u3092\u3057\u3066\u3044\u307e\u3059\u304b\uff1f","Zoom\u6e96\u5099",2],["mail","\u30e1\u30fc\u30eb\u8fd4\u4fe1\u306b\u6bce\u65e530\u5206\u4ee5\u4e0a\u4f7f\u3063\u3066\u3044\u307e\u3059\u304b\uff1f","\u30e1\u30fc\u30eb\u8fd4\u4fe1",10],["manual","\u30de\u30cb\u30e5\u30a2\u30eb\u4f5c\u6210\u3092\u3057\u3066\u3044\u307e\u3059\u304b\uff1f","\u30de\u30cb\u30e5\u30a2\u30eb\u4f5c\u6210",4],["research","\u30ea\u30b5\u30fc\u30c1\u3092\u81ea\u5206\u3067\u3057\u3066\u3044\u307e\u3059\u304b\uff1f","\u30ea\u30b5\u30fc\u30c1",4],["repeat","\u7e70\u308a\u8fd4\u3057\u4f5c\u696d\u304c\u591a\u3044\u3067\u3059\u304b\uff1f","\u7e70\u308a\u8fd4\u3057\u4f5c\u696d",6],["admin","\u672c\u696d\u3088\u308a\u4e8b\u52d9\u4f5c\u696d\u306e\u6642\u9593\u304c\u591a\u3044\u3068\u611f\u3058\u307e\u3059\u304b\uff1f","\u4e8b\u52d9\u4f5c\u696d\u306e\u6574\u7406",8]
];
const opts=[[J.almost,3,J.desc1],[J.sometimes,2,J.desc2],[J.rare,1,J.desc3]];
let started=false,step=0,showResult=false,answers={};const app=document.getElementById("app");
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function lv(t){if(t<=15)return{level:"Level 1",label:"\u307e\u3060\u4f59\u88d5\u304c\u3042\u308a\u307e\u3059\u3002",message:"\u5c11\u3057\u305a\u3064\u4ed5\u7d44\u307f\u5316\u3092\u59cb\u3081\u307e\u3057\u3087\u3046\u3002",cap:12};if(t<=22)return{level:"Level 2",label:"\u624b\u653e\u305b\u308b\u4ed5\u4e8b\u304c\u3042\u308a\u307e\u3059\u3002",message:"\u307e\u305a\u306f\u4e00\u3064\u4efb\u305b\u3066\u307f\u307e\u3057\u3087\u3046\u3002",cap:22};if(t<=27)return{level:"Level 3",label:"\u304b\u306a\u308a\u5fd9\u3057\u3044\u72b6\u614b\u3067\u3059\u3002",message:"\u672c\u696d\u3078\u96c6\u4e2d\u3059\u308b\u6642\u9593\u3092\u4f5c\u308b\u30bf\u30a4\u30df\u30f3\u30b0\u3067\u3059\u3002",cap:32};return{level:"Level 4",label:"\u8981\u6ce8\u610f",message:"\u793e\u9577\u696d\u3088\u308a\u4f5c\u696d\u6642\u9593\u304c\u591a\u3044\u72b6\u614b\u3067\u3059\u3002",cap:42}}
function res(){const total=qs.reduce((s,q)=>s+(answers[q[0]]||0),0),l=lv(total);const raw=qs.reduce((s,q)=>{const v=answers[q[0]]||1;return s+q[3]*(v===3?1:v===2?.55:.12)},0);const hours=Math.max(6,Math.min(l.cap,Math.round(raw)));const high=qs.filter(q=>(answers[q[0]]||0)>=2).sort((a,b)=>(answers[b[0]]||0)-(answers[a[0]]||0)||b[3]-a[3]).slice(0,3).map(q=>q[2]);const fb=["\u8cc7\u6599\u4f5c\u6210","LINE","Canva"];return{total,hours,tasks:(high.length>=3?high:[...high,...fb.filter(x=>!high.includes(x))]).slice(0,3),...l}}
function lineHref(r){return lineUrl}
function renderTop(){app.innerHTML='<section class="page"><div class="wrap"><div class="card"><div class="top"><div class="icon">◷</div><div class="ey">3 MIN CHECK</div></div><p class="sm">'+J.sub+'</p><h1>'+J.title+'</h1><div class="rule"></div><p class="body">'+J.you+'<br>・'+J.hand+'<br>・'+J.hours+'<br>・'+J.priority+'<br>'+J.wakaru+'</p><button class="btn" id="start">'+J.start+' →</button></div></div></section>';document.getElementById("start").onclick=()=>{started=true;render()}}
function question(){const q=qs[step],sel=answers[q[0]],pct=Math.max(8,Math.round(step/qs.length*100));app.innerHTML='<section class="page"><div class="wrap"><div class="card"><div class="meta"><strong style="color:var(--n)">Q'+(step+1)+'</strong><span style="color:var(--m)">'+(step+1)+' / '+qs.length+'</span></div><div class="bar"><div class="fill" style="width:'+pct+'%"></div></div><div class="icon" style="margin-top:32px">☷</div><h2 class="qt">'+esc(q[1])+'</h2><div class="opts">'+opts.map(o=>'<button class="opt '+(sel===o[1]?'on':'')+'" data-score="'+o[1]+'"><span class="ot">'+o[0]+'<span class="dot">✓</span></span><span class="od">'+o[2]+'</span></button>').join("")+'</div><div class="nav"><button class="back" '+(step===0?'disabled':'')+' id="back">← 戻る</button><button class="next" '+(!sel?'disabled':'')+' id="next">'+(step===qs.length-1?'結果を見る':'次へ')+' →</button></div></div></div></section>';document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{answers[q[0]]=Number(b.dataset.score);render()});document.getElementById("back").onclick=()=>{step=Math.max(0,step-1);render()};document.getElementById("next").onclick=()=>{if(!answers[q[0]])return;if(step<qs.length-1){step++;render()}else{showResult=true;render()}}}
function result(){const r=res(),msg=[J.title+"\u306e\u7d50\u679c",r.level+"："+r.label,J.score+"："+r.total+"\u70b9",J.recovered+"：\u7d04"+r.hours+"\u6642\u9593/\u6708",J.first+"："+r.tasks.join("、")].join("\n");app.innerHTML='<section class="page"><div class="wrap"><div class="card"><div class="top" style="margin-bottom:16px"><div><div class="ey">RESULT</div><h1 style="font-size:32px;margin-top:10px">'+r.level+'</h1></div><div class="icon">⌁</div></div><div class="soft"><h2 style="font-size:20px">'+r.label+'</h2><p class="body" style="font-size:14px;line-height:2">'+r.message+'</p><p class="sm">'+J.score+'：'+r.total+'点</p></div><div class="grid"><div class="panel"><div class="pt">◷ '+J.recovered+'</div><div class="hours">約'+r.hours+'時間</div><div class="sm">/ 月</div></div><div class="panel"><div class="pt">☷ '+J.first+'</div><ul class="list">'+r.tasks.map(t=>'<li>✓ '+esc(t)+'</li>').join("")+'</ul></div></div><div class="panel" style="margin-top:18px"><div class="pt">✧ '+J.point+'</div><div class="pills"><div class="pill">'+J.ai+'</div><div class="pill">'+J.manualize+'</div><div class="pill">'+J.secretary+'</div></div></div></div><div class="card"><div class="icon">♡</div><h2 style="margin-top:26px">'+J.cta+'</h2><p class="body" style="font-size:14px;line-height:2.25">'+J.exp+'<br>'+J.support1+'<br>'+J.support2+'<br>'+J.support3+'</p><a class="btn" href="'+esc(lineHref(r))+'">○ '+J.consult+'</a><button class="ghost n" id="copy">▣ '+J.copy+'</button><div class="toast" id="toast"></div><button class="ghost" id="reset">↻ '+J.again+'</button></div></div></section>';document.getElementById("copy").onclick=async()=>{await navigator.clipboard.writeText(msg);document.getElementById("toast").textContent=J.copied};document.getElementById("reset").onclick=()=>{started=false;step=0;showResult=false;answers={};render()}}
function render(){if(!started)return renderTop();if(showResult)return result();return question()}render();
</script>
</body>
</html>
